<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Content Calendar — @noahugcjourney</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #10B981;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.15;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #10B981;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-family: Arial, sans-serif;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #444; }
    input:focus { border-color: #10B981; }

    button {
      width: 100%;
      padding: 14px;
      background: #10B981;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      font-family: Arial, sans-serif;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button:hover { background: #0ea572; }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }

    /* Success state */
    .success {
      display: none;
      text-align: center;
      padding: 16px 0;
    }

    .success .tick {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .success h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="form-section">
      <div class="label">Free Download</div>
      <h1>Content Calendar Framework</h1>
      <p class="sub">The exact system behind 25M+ views. Drop your info and the PDF downloads instantly.</p>
      <div class="divider"></div>

      <form id="lead-form">
        <label for="name">First Name</label>
        <input type="text" id="name" placeholder="Your name" required autocomplete="given-name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">

        <button type="submit">Get it free →</button>
      </form>

      <p class="footer">@noahugcjourney · noahgrowth.com</p>
    </div>

    <div class="success" id="success-section">
      <div class="tick">✓</div>
      <h2>You're in.</h2>
      <p>Your download started automatically.<br>Check your downloads folder.</p>
      <p class="footer" style="margin-top: 24px;">@noahugcjourney · noahgrowth.com</p>
    </div>

  </div>

  <script>
    const SHEET_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";
    const PDF_URL = "https://noahugcjourney.github.io/content-calendar/Content_Calendar.pdf";

    document.getElementById("lead-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const name  = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      // Send lead to Google Sheet
      fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, date: new Date().toISOString() })
      }).catch(() => {});

      // Trigger PDF download
      const a = document.createElement("a");
      a.href = PDF_URL;
      a.download = "Noahs_Content_Calendar_Framework.pdf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // Show success screen
      document.getElementById("form-section").style.display = "none";
      document.getElementById("success-section").style.display = "block";
    });
  </script>
</body>
</html>
